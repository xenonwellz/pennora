# Pennora API — Cloudflare Worker
# Deploy: npx wrangler deploy

name = "pennora"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "pennora"
database_id = "45980ea3-e99c-4153-94f9-442e4bafbf33"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "pennora"

# Public URLs — must match your custom domain
[vars]
BETTER_AUTH_URL = "https://pennora.cv"
APP_URL = "https://pennora.cv"
EMAIL_FROM = "Pennora <noreply@pennora.cv>"

# Uncomment after the domain is on Cloudflare:
# [[routes]]
# pattern = "pennora.cv/api/*"
# zone_name = "pennora.cv"

[observability]
enabled = true
