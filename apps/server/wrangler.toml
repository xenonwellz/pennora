# Pennora API — Cloudflare Worker
#
# Prerequisites:
#   1. npx wrangler login
#   2. npx wrangler d1 create pennora      (first time only)
#   3. Copy the database ID from step 2 and paste it below as database_id
#
# Deploy:
#   npx wrangler deploy

name = "pennora"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "pennora"
database_id = "45980ea3-e99c-4153-94f9-442e4bafbf33"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "pennora"

# Public URLs — must match your custom domain
[vars]
BETTER_AUTH_URL = "https://pennora-web.pages.dev"
APP_URL = "https://pennora-web.pages.dev"
EMAIL_FROM = "Pennora <noreply@pennora.cv>"

[observability]
enabled = true
