services:
    postgres:
        image: postgres:17-alpine
        profiles: ["deps"]
        environment:
            POSTGRES_USER: expense
            POSTGRES_PASSWORD: expense
            POSTGRES_DB: expense
        ports:
            - "19832:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U expense"]
            interval: 5s
            timeout: 3s
            retries: 5

volumes:
    pgdata:
